<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <i class="fas fa-edit mr-2"></i>
                    <h3 class="mb-0">Modifier l'historique de tarif</h3>
                </div>
                <div class="card-body">
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-warning" role="status">
                            <span class="sr-only">Chargement...</span>
                        </div>
                        <p class="mt-2 text-muted">Chargement des données...</p>
                    </div>

                    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
                        <div class="form-group">
                            <label><i class="fas fa-map mr-1"></i> Zone *</label>
                            <select formControlName="zoneId" class="form-control">
                                <option value="">-- Sélectionnez --</option>
                                <option *ngFor="let z of zones" [value]="z.id">{{ z.nom }}</option>
                            </select>
                            <div class="text-danger" *ngIf="form.get('zoneId')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-arrow-down mr-1"></i> Ancien tarif *</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text"><i class="fas fa-euro-sign"></i></span>
                                        </div>
                                        <input type="number" step="0.01" formControlName="ancienTarif" class="form-control">
                                    </div>
                                    <div class="text-danger" *ngIf="form.get('ancienTarif')?.errors?.['required']">Requis</div>
                                    <div class="text-danger" *ngIf="form.get('ancienTarif')?.errors?.['min']">Doit être positif</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-arrow-up mr-1"></i> Nouveau tarif *</label>
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text"><i class="fas fa-euro-sign"></i></span>
                                        </div>
                                        <input type="number" step="0.01" formControlName="nouveauTarif" class="form-control">
                                    </div>
                                    <div class="text-danger" *ngIf="form.get('nouveauTarif')?.errors?.['required']">Requis</div>
                                    <div class="text-danger" *ngIf="form.get('nouveauTarif')?.errors?.['min']">Doit être positif</div>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-user mr-1"></i> Modifié par (ID)</label>
                            <input type="number" formControlName="modifiePar" class="form-control">
                        </div>

                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">
                                <i class="fas fa-times mr-1"></i> Annuler
                            </button>
                            <button type="submit" class="btn btn-warning" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                <i class="fas fa-save mr-1" *ngIf="!loading"></i>
                                {{ loading ? 'Modification...' : 'Modifier' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
