<div class="container mt-4">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title mb-0">Avis clients</h3>
            <button class="btn btn-primary" (click)="onAdd()">
                <i class="fas fa-plus mr-2"></i>Ajouter un avis
            </button>
        </div>
        <div class="card-body">
            <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="thead-dark">
                    <tr>
                        <th>ID</th><th>Course</th><th>Note</th><th>Commentaire</th><th>Date</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr *ngIf="loading"><td colspan="6" class="text-center">Chargement...</td></tr>
                    <tr *ngFor="let a of avis">
                        <td>{{ a.id }}</td>
                        <td>{{ a.courseId }}</td>
                        <td>{{ a.note }}/5 <span class="text-warning">★</span></td>
                        <td>{{ a.commentaire }}</td>
                        <td>{{ a.dateAvis | date:'dd/MM/yyyy HH:mm' }}</td>
                        <td>
                            <button class="btn btn-warning btn-sm mr-1" (click)="onEdit(a.id!)">
                                <i class="fas fa-edit"></i> Modifier
                            </button>
                            <button class="btn btn-danger btn-sm" (click)="onDelete(a.id!)">
                                <i class="fas fa-trash"></i> Supprimer
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="avis.length === 0 && !loading">
                        <td colspan="6" class="text-center">Aucun avis</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
