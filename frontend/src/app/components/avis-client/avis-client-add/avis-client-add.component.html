<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <i class="fas fa-star mr-2"></i>
                    <h3 class="mb-0">Ajouter un avis client</h3>
                </div>
                <div class="card-body">
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="sr-only">Chargement...</span>
                        </div>
                        <p class="mt-2 text-muted">Création en cours...</p>
                    </div>

                    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
                        <div class="form-group">
                            <label><i class="fas fa-taxi mr-1"></i> Course *</label>
                            <select formControlName="courseId" class="form-control">
                                <option value="">-- Sélectionnez --</option>
                                <option *ngFor="let c of courses" [value]="c.id">{{ c.id }} ({{ c.createdAt | date }})</option>
                            </select>
                            <div class="text-danger" *ngIf="form.get('courseId')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-star mr-1"></i> Note * (1 à 5)</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fas fa-star"></i></span>
                                </div>
                                <input type="number" formControlName="note" class="form-control" min="1" max="5">
                            </div>
                            <div class="text-danger" *ngIf="form.get('note')?.errors?.['required']">Requis</div>
                            <div class="text-danger" *ngIf="form.get('note')?.errors?.['min'] || form.get('note')?.errors?.['max']">Entre 1 et 5</div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-comment mr-1"></i> Commentaire</label>
                            <textarea formControlName="commentaire" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">
                                <i class="fas fa-times mr-1"></i> Annuler
                            </button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                <i class="fas fa-save mr-1" *ngIf="!loading"></i>
                                {{ loading ? 'Création...' : 'Créer' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
