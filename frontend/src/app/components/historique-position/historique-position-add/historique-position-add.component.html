<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <i class="fas fa-map-marker-alt mr-2"></i>
                    <h3 class="mb-0">Ajouter une position</h3>
                </div>
                <div class="card-body">
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="sr-only">Chargement...</span>
                        </div>
                        <p class="mt-2 text-muted">Création en cours...</p>
                    </div>

                    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
                        <div class="form-group">
                            <label><i class="fas fa-user mr-1"></i> Chauffeur *</label>
                            <select formControlName="chauffeurId" class="form-control">
                                <option value="">-- Sélectionnez --</option>
                                <option *ngFor="let c of chauffeurs" [value]="c.id">{{ c.nom }} {{ c.prenom }}</option>
                            </select>
                            <div class="text-danger" *ngIf="form.get('chauffeurId')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-arrow-up mr-1"></i> Latitude *</label>
                                    <input type="number" step="any" formControlName="latitude" class="form-control" placeholder="ex: 14.7167">
                                    <div class="text-danger" *ngIf="form.get('latitude')?.errors?.['required']">Requis</div>
                                    <div class="text-danger" *ngIf="form.get('latitude')?.errors?.['min'] || form.get('latitude')?.errors?.['max']">Entre -90 et 90</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-arrow-right mr-1"></i> Longitude *</label>
                                    <input type="number" step="any" formControlName="longitude" class="form-control" placeholder="ex: -17.4667">
                                    <div class="text-danger" *ngIf="form.get('longitude')?.errors?.['required']">Requis</div>
                                    <div class="text-danger" *ngIf="form.get('longitude')?.errors?.['min'] || form.get('longitude')?.errors?.['max']">Entre -180 et 180</div>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-tachometer-alt mr-1"></i> Vitesse (km/h)</label>
                                    <input type="number" step="0.01" formControlName="vitesseKmh" class="form-control">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-info-circle mr-1"></i> Statut véhicule</label>
                                    <input type="text" formControlName="statutVehicule" class="form-control" placeholder="ex: En marche, Arrêté...">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-clock mr-1"></i> Date/heure de la position *</label>
                            <input type="datetime-local" formControlName="timestampPosition" class="form-control">
                            <div class="text-danger" *ngIf="form.get('timestampPosition')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">
                                <i class="fas fa-times mr-1"></i> Annuler
                            </button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                <i class="fas fa-save mr-1" *ngIf="!loading"></i>
                                {{ loading ? 'Création...' : 'Créer' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
