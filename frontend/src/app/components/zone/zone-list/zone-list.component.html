<div class="container mt-4">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3>Liste des zones</h3>
            <button class="btn btn-primary" (click)="onAdd()">
                <i class="fas fa-plus mr-2"></i>Ajouter une zone
            </button>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Rechercher par nom..."
                               [(ngModel)]="searchTerm"
                               (keyup.enter)="onSearch()">
                        <div class="input-group-append">
                            <button class="btn btn-outline-primary" (click)="onSearch()">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

            <div class="table-responsive">
                <table class="table">
                    <thead class="thead-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Couleur</th>
                        <th>Tarif (FCFA)</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </thead>
                    <tbody>
                    <tr *ngIf="loading"><td colspan="6" class="text-center">Chargement... </tr>
                    <tr *ngFor="let z of zones">
                        <td data-label="ID">{{ z.id }}</td>
                        <td data-label="Nom">{{ z.nom }}</td>
                        <td data-label="Couleur">
                            <span class="color-preview" [style.backgroundColor]="z.couleur"></span>
                            {{ z.couleur }}
                        </td>
                        <td data-label="Tarif">{{ z.tarif | number }}</td>
                        <td data-label="Statut">
                                    <span class="badge" [ngClass]="getActifClass(z.actif)">
                                        {{ getActifText(z.actif) }}
                                    </span>
                        </td>
                        <td data-label="Actions">
                            <button class="btn btn-warning btn-sm mr-1" (click)="onEdit(z.id!)">
                                <i class="fas fa-edit"></i> Modifier
                            </button>
                            <button class="btn btn-danger btn-sm" (click)="onDelete(z.id!)">
                                <i class="fas fa-trash"></i> Supprimer
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="zones.length === 0 && !loading">
                        <td colspan="6" class="text-center">Aucune zone trouvée</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
