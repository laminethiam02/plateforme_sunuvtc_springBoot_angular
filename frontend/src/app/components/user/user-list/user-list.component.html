<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h3 class="card-title mb-0">Gestion des Utilisateurs</h3>
                    <button routerLink="/users/add" class="btn btn-primary">
                        <i class="fas fa-plus mr-2"></i>Ajouter un utilisateur
                    </button>
                </div>
                <div class="card-body">
                    <!-- Barre de recherche -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Rechercher..."
                                       [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary" (click)="onSearch()">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Message d'erreur -->
                    <div class="alert alert-danger" *ngIf="errorMessage" role="alert">
                        {{ errorMessage }}
                    </div>

                    <!-- Tableau -->
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered">
                            <thead class="thead-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nom d'utilisateur</th>
                                <th>Email</th>
                                <th>Nom complet</th>
                                <th>Téléphone</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- Chargement -->
                            <tr *ngIf="loading">
                                <td colspan="6" class="text-center">Chargement...</td>
                            </tr>
                            <!-- Liste des utilisateurs -->
                            <tr *ngFor="let user of filteredUsers">   <!-- ← modification ici -->
                                <td data-label="ID">{{ user.id }}</td>
                                <td data-label="Nom d'utilisateur">{{ user.username }}</td>
                                <td data-label="Email">{{ user.email }}</td>
                                <td data-label="Nom complet">{{ user.fullName }}</td>
                                <td data-label="Téléphone">{{ user.phone }}</td>
                                <td data-label="Actions">
                                    <button [routerLink]="['/users/edit', user.id]"
                                            class="btn btn-warning btn-sm mr-1"
                                            title="Modifier">
                                        <i class="fas fa-edit"></i> Modifier
                                    </button>
                                    <button (click)="deleteUser(user.id!)"
                                            class="btn btn-danger btn-sm"
                                            title="Supprimer">
                                        <i class="fas fa-trash"></i> Supprimer
                                    </button>
                                </td>
                            </tr>
                            <!-- Aucun résultat -->
                            <tr *ngIf="!loading && users.length === 0">
                                <td colspan="6" class="text-center">Aucun utilisateur trouvé.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
