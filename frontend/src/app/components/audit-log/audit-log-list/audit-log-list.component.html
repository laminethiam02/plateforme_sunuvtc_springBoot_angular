<div class="container mt-4">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title mb-0">Audit logs</h3>
            <button class="btn btn-primary" (click)="onAdd()">
                <i class="fas fa-plus mr-2"></i>Ajouter un log
            </button>
        </div>
        <div class="card-body">
            <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="thead-dark">
                    <tr>
                        <th>ID</th><th>Type utilisateur</th><th>ID utilisateur</th><th>Action</th>
                        <th>Détails</th><th>IP</th><th>Date</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr *ngIf="loading"><td colspan="8" class="text-center">Chargement...</td></tr>
                    <tr *ngFor="let l of logs">
                        <td>{{ l.id }}</td>
                        <td>{{ l.utilisateurType }}</td>
                        <td>{{ l.utilisateurId }}</td>
                        <td>{{ l.action }}</td>
                        <td>{{ l.details }}</td>
                        <td>{{ l.ipAddress }}</td>
                        <td>{{ l.createdAt | date:'dd/MM/yyyy HH:mm:ss' }}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" (click)="onDelete(l.id!)">
                                <i class="fas fa-trash"></i> Supprimer
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="logs.length === 0 && !loading">
                        <td colspan="8" class="text-center">Aucun log</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
