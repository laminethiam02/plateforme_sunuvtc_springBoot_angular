<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <i class="fas fa-history mr-2"></i>
                    <h3 class="mb-0">Ajouter un log d'audit</h3>
                </div>
                <div class="card-body">
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="sr-only">Chargement...</span>
                        </div>
                        <p class="mt-2 text-muted">Création en cours...</p>
                    </div>

                    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
                        <div class="form-group">
                            <label><i class="fas fa-user-tag mr-1"></i> Type utilisateur *</label>
                            <select formControlName="utilisateurType" class="form-control">
                                <option value="">-- Sélectionnez --</option>
                                <option value="CHAUFFEUR">Chauffeur</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                            <div class="text-danger" *ngIf="form.get('utilisateurType')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-id-badge mr-1"></i> ID utilisateur *</label>
                            <input type="number" formControlName="utilisateurId" class="form-control">
                            <div class="text-danger" *ngIf="form.get('utilisateurId')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-tasks mr-1"></i> Action *</label>
                            <input type="text" formControlName="action" class="form-control" placeholder="ex: Connexion, Modification...">
                            <div class="text-danger" *ngIf="form.get('action')?.errors?.['required']">Requis</div>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-info-circle mr-1"></i> Détails (JSON)</label>
                            <textarea formControlName="details" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-network-wired mr-1"></i> Adresse IP</label>
                            <input type="text" formControlName="ipAddress" class="form-control" placeholder="192.168.1.1">
                        </div>

                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">
                                <i class="fas fa-times mr-1"></i> Annuler
                            </button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                <i class="fas fa-save mr-1" *ngIf="!loading"></i>
                                {{ loading ? 'Création...' : 'Créer' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
