<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">Ajouter un chauffeur</div>
                <div class="card-body">
                    <form [formGroup]="form" (ngSubmit)="onSubmit()">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" formControlName="email" class="form-control">
                            <div class="text-danger" *ngIf="form.get('email')?.errors?.['required']">Requis</div>
                            <div class="text-danger" *ngIf="form.get('email')?.errors?.['email']">Email invalide</div>
                        </div>
                        <div class="form-group">
                            <label>Mot de passe *</label>
                            <input type="password" formControlName="password" class="form-control">
                            <div class="text-danger" *ngIf="form.get('password')?.errors?.['required']">Requis</div>
                            <div class="text-danger" *ngIf="form.get('password')?.errors?.['minlength']">Min 6 caractères</div>
                        </div>
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" formControlName="nom" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Prénom</label>
                            <input type="text" formControlName="prenom" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Statut du véhicule</label>
                            <select formControlName="statutVehicule" class="form-control">
                                <option value="LIBRE">Libre</option>
                                <option value="EN_COURSE">En course</option>
                                <option value="HORS_SERVICE">Hors service</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Zone assignée</label>
                            <select formControlName="zoneAssigneeId" class="form-control">
                                <option value="">-- Aucune --</option>
                                <option *ngFor="let z of zones" [value]="z.id">{{ z.nom }}</option>
                            </select>
                        </div>
                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">Annuler</button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                Créer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
