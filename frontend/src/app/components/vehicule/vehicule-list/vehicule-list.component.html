<div class="container mt-4">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title mb-0">Liste des véhicules</h3>
            <button class="btn btn-primary" (click)="onAdd()">
                <i class="fas fa-plus mr-2"></i>Ajouter un véhicule
            </button>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Rechercher..."
                               [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
                        <div class="input-group-append">
                            <button class="btn btn-outline-secondary" (click)="onSearch()">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

            <div class="table-responsive">
                <table class="table table-striped table-bordered">
                    <thead class="thead-dark">
                    <tr>
                        <th>ID</th><th>Immatriculation</th><th>Marque</th><th>Modèle</th><th>Année</th><th>Capacité</th><th>Chauffeur</th><th>Actif</th><th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr *ngIf="loading"><td colspan="9" class="text-center">Chargement...</td></tr>
                    <tr *ngFor="let v of vehicules">
                        <td>{{ v.id }}</td>
                        <td>{{ v.immatriculation }}</td>
                        <td>{{ v.marque }}</td>
                        <td>{{ v.modele }}</td>
                        <td>{{ v.annee }}</td>
                        <td>{{ v.capacite }}</td>
                        <td>{{ v.chauffeurId }}</td>
                        <td><span class="badge" [ngClass]="v.actif ? 'badge-success' : 'badge-danger'">{{ v.actif ? 'Actif' : 'Inactif' }}</span></td>
                        <td>
                            <button class="btn btn-warning btn-sm mr-1" (click)="onEdit(v.id!)">
                                <i class="fas fa-edit"></i> Modifier
                            </button>
                            <button class="btn btn-danger btn-sm" (click)="onDelete(v.id!)">
                                <i class="fas fa-trash"></i> Supprimer
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="vehicules.length === 0 && !loading">
                        <td colspan="9" class="text-center">Aucun véhicule</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
