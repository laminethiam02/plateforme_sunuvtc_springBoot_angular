<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <i class="fas fa-car mr-2"></i>
                    <h3 class="mb-0">Ajouter un véhicule</h3>
                </div>
                <div class="card-body">
                    <div *ngIf="loading" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="sr-only">Chargement...</span>
                        </div>
                        <p class="mt-2 text-muted">Création en cours...</p>
                    </div>

                    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading">
                        <div class="form-group">
                            <label><i class="fas fa-id-card mr-1"></i> Immatriculation <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                </div>
                                <input type="text" formControlName="immatriculation" class="form-control" placeholder="Ex: AB-123-CD">
                            </div>
                            <div class="text-danger" *ngIf="form.get('immatriculation')?.errors?.['required']">Requis</div>
                            <div class="text-danger" *ngIf="form.get('immatriculation')?.errors?.['maxlength']">Maximum 20 caractères</div>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-tag mr-1"></i> Marque</label>
                                    <input type="text" formControlName="marque" class="form-control" placeholder="Toyota, Renault...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-tag mr-1"></i> Modèle</label>
                                    <input type="text" formControlName="modele" class="form-control" placeholder="Corolla, Clio...">
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-palette mr-1"></i> Couleur</label>
                                    <input type="text" formControlName="couleur" class="form-control" placeholder="Rouge, Bleu...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-calendar-alt mr-1"></i> Année</label>
                                    <input type="number" formControlName="annee" class="form-control" placeholder="2020">
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-users mr-1"></i> Capacité (places)</label>
                                    <input type="number" formControlName="capacite" class="form-control" min="1">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label><i class="fas fa-user mr-1"></i> Chauffeur assigné</label>
                                    <select formControlName="chauffeurId" class="form-control">
                                        <option value="">-- Aucun --</option>
                                        <option *ngFor="let c of chauffeurs" [value]="c.id">{{ c.nom }} {{ c.prenom }}</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-group form-check">
                            <input type="checkbox" formControlName="actif" class="form-check-input" id="actifCheck">
                            <label class="form-check-label" for="actifCheck">Véhicule actif</label>
                        </div>

                        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

                        <div class="text-right">
                            <button type="button" class="btn btn-secondary mr-2" (click)="onCancel()">
                                <i class="fas fa-times mr-1"></i> Annuler
                            </button>
                            <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
                                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                                <i class="fas fa-save mr-1" *ngIf="!loading"></i>
                                {{ loading ? 'Création...' : 'Créer' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
